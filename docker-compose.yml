services:
  # Development with hot reload (default): docker compose up
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
    env_file:
      - path: .env
        required: false
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://dummyjson.com}
      # Improves file watching when the project folder is bind-mounted (Windows/macOS)
      CHOKIDAR_USEPOLLING: "true"

  # Production build served by nginx: docker compose --profile prod up --build
  prod:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://dummyjson.com}
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  dev_node_modules:
